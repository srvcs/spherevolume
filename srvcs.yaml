schemaVersion: 1
name: "srvcs-spherevolume"
slug: "spherevolume"
repository: "srvcs/spherevolume"
package: "srvcs-spherevolume"
function: "geometry: volume of a sphere"
kind: "orchestrator"
categories:
  - "geometry"
dependencies:
  - slug: "pi"
    service: "srvcs-pi"
  - slug: "floatmultiply"
    service: "srvcs-floatmultiply"
  - slug: "floatdivide"
    service: "srvcs-floatdivide"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "radius"
    type: "json"
    required: true
outputs:
  - name: "radius"
    type: "json"
  - name: "result"
    type: "number"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_FLOATDIVIDE_URL"
    default: "http://127.0.0.1:8092"
    purpose: "Base URL for srvcs-floatdivide"
  - name: "SRVCS_FLOATMULTIPLY_URL"
    default: ""
    purpose: "Base URL for srvcs-floatmultiply"
  - name: "SRVCS_PI_URL"
    default: "http://127.0.0.1:8090"
    purpose: "Base URL for srvcs-pi"
